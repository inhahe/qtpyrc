; toolbar.ini - Toolbar button definitions
;
; Format:  icon | label | command
; Use - for a vertical separator, --- for a new row, ; for comments.
;
; Icons are looked up in the icons/ directory (as .svg, .png, or .ico),
; then fall back to built-in Qt icons (see list below).
; Leave icon blank for a text-only button:   | My Button | /mycommand
; Two-field shorthand also works:  My Button | /mycommand
;
; The command can be any /command, including menu actions like /settings,
; /tile, /cascade, /newserver, /away, etc.
; Commands support $?="prompt" for input dialogs.
;
; Variables: define with  name = value  and use as {name} in any field.
; Example:
;   mychan = #general
;   channel | Join {mychan} | /join {mychan}
;
; Bundled icons (in icons/ directory):
;   settings, editor, toggle_view, tile, cascade, away, back, new_server,
;   connect, disconnect, search, refresh, save, user, message, bell,
;   lock, channel, eraser, list, close, help, world, plus, door_enter, door_exit
;
; Most icons also have _alt1, _alt2, _alt3 variants you can swap in.
; To rename an alt:  rename  away_alt1.svg -> away.svg  (and move the old one)
;
; For thousands more free icons, browse:
;   https://tabler.io/icons
; Download any SVG and place it in the icons/ directory.
; Direct SVG download link format:
;   https://raw.githubusercontent.com/tabler/tabler-icons/main/icons/outline/<name>.svg

settings    | Settings           | /settings
editor      | File Editor        | /settings editor
-
toggle_view | Toggle Tabbed/MDI  | /tabbed
tile        | Tile Windows       | /tile
cascade     | Cascade Windows    | /cascade
-
away        | Set Away           | /away $?="Away message (blank for default):"
back        | Set Back           | /away
-
new_server  | New Server Window  | /newserver
-
palette     | Color Picker       | /ui menu.tools.colorpicker
