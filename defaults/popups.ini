; popups.ini - Right-click popup menus (mIRC-compatible syntax)
;
; Sections: [nicklist], [channel], [status], [query], [link], [tab]
;
; Syntax:
;   Menu Item:/command                  — menu item that runs a command
;   Submenu Header                      — label with no command = submenu parent
;   .Child Item:/command                — child of previous submenu (dot = depth)
;   ..Grandchild:/command               — deeper nesting
;   -                                   — separator line
;   @additive                           — append parent popup entries below this section
;   @replace                            — only show this section's entries (default)
;
; Variables:
;   mIRC-style:
;     $nick, $me, $chan, $network, $server
;     $$1          — selected nick (required; cancels if empty)
;     $1           — selected nick (optional)
;     $?="prompt"  — ask for input (optional)
;     $$?="prompt" — ask for input (required; cancels if blank)
;     #            — current channel (bare # outside variables)
;
;   {variable}-style:
;     {nick}, {me}, {chan}, {network}, {server}, {link}
;
;   $link / {link} is only available in [link] section (the URL that was clicked)
;
; Lines starting with ; are comments.

[nicklist]
@additive
Whois:/whois $$1
Whowas:/whowas $$1
Message:/query $$1
Invite:/invite $$1 $?="Channel to invite to:"
-
CTCP
.Ping:/ctcp $$1 PING
.Version:/ctcp $$1 VERSION
.Finger:/ctcp $$1 FINGER
.Time:/ctcp $$1 TIME
-
Control
.Op:/mode # +o $$1
.Deop:/mode # -o $$1
.Half-op:/mode # +h $$1
.De-halfop:/mode # -h $$1
.-
.Voice:/mode # +v $$1
.Devoice:/mode # -v $$1
.-
.Quiet:/mode # +q $$1
.Unquiet:/mode # -q $$1
.-
.Kick:/kick # $$1
.Kick (message):/kick # $$1 :$?="Kick reason:"
.Ban:/mode # +b $$1!*@*
.Kick+Ban:/mode # +b $$1!*@* | /kick # $$1
.Kick+Ban (message):/mode # +b $$1!*@* | /kick # $$1 :$?="Kick reason:"
-
Ignore:/ignore $$1
Unignore:/ignore -r $$1
Auto-op:/aop $$1
Remove Auto-op:/aop -r $$1

[channel]
Channel Details:/chaninfo
-
Names:/names #
Topic:/topic #
-
Part:/part #
Rejoin:/hop

[status]
Lusers:/lusers
MOTD:/motd
Time:/time
-
List Channels:/list >2

[query]
Whois:/whois $nick
-
CTCP
.Ping:/ctcp $nick PING
.Version:/ctcp $nick VERSION
.Finger:/ctcp $nick FINGER
.Time:/ctcp $nick TIME

[link]
@additive
Open Link:/openurl $link
Copy Link:/clipboard $link

[tab]
Connect:/connect $network
Disconnect:/disconnect
-
Close:/close
