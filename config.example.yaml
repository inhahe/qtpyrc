# =============================================================================
# qtpyrc configuration
# =============================================================================
# This file documents every configuration variable.
# Copy it to config.yaml and edit to taste.
# Run with: python qtpyrc.py -c config.yaml


# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------

# Number of visible lines in the input field (1-10, default 1).
# Values > 1 enable multiline input; Ctrl+Enter inserts a newline.
input_lines: 1

# Tab completion: max age (seconds) for prioritizing recently active nicks.
# Nicks who spoke within this window are sorted first, then nicks you mentioned,
# then alphabetical.  0 = no age limit (use entire channel history buffer).
# tab_complete_age: 3600

# Prefix character for slash commands.
command_prefix: "/"

# Right-click popup menus file (mIRC-compatible .ini format).
# Remove or set to "" to disable.  Not loaded unless specified.
popups_file: popups.ini

# Persistent user variables file (/set command).
# Remove or set to "" to disable.  Not loaded unless specified.
variables_file: variables.ini

# Toolbar button definitions file.
# Remove or set to "" to disable.  Not loaded unless specified.
toolbar_file: toolbar.ini

# Show the toolbar.  Set to false to hide it completely.
show_toolbar: true

# Toolbar icon size in pixels (width and height).  Default: 20.
toolbar_icon_size: 20

# Legacy toolbar font/color keys (now under font.toolbar_* and colors.toolbar.*).
# toolbar_font_family: Segoe UI
# toolbar_font_size: 11
# toolbar_foreground_color: "#cccccc"
# toolbar_separator_color: "#666666"

# External text editor for editing config/script files.
# If set, the Config/Startup/Popups buttons in the File Editor will open
# this program instead of the built-in editor.
# external_editor: notepad++

# UI state file (splitter sizes, recent sounds, etc.).  Default: ui.yaml.
ui_state_file: ui.yaml

# Main window state on launch: "maximized" or "normal".
window_mode: maximized

# Main window title format.  Leave empty for the default
# ("qtpyrc - net1 (nick1), net2 (nick2)").
# Supports {me}, {network_key}, {network_name}, {network_hostname}, {channel},
# {topic}, {nicks}, {port}, {ident}, {host}, {address}, {realname},
# {sasl_username}, {connected}, {tls}, {key}, {window_type}, {networks},
# {channels} from the active window, and {eval("python expression")} function calls.
# Other functions: {stdin("prompt")} reads a line from the terminal.
# The eval namespace includes `state`, `import_module`, and `stdin`.
# The title refreshes every 3s and immediately on connect/disconnect/nick change.
# Example: 'qtpyrc ({me} on {network_key}) - {channel}'
#titlebar_format: ""
# How often (in seconds) to refresh the title bar.  Minimum 0.1.
#titlebar_interval: 1

# Window title format strings.  Supports the same {variables} and {eval("...")}
# function calls as titlebar_format.  Additional variables for window titles:
#   {network_label}  — display label: network_key → network_name → hostname → "unknown"
#   {query_nick}     — the query peer's nick (query windows only)
# Titles refresh on the same timer as titlebar_format
# and on connect/disconnect/nick/topic changes.
titles:
  server: "{network_label} - {me}"
  server_disconnected: "[not connected] {network_label} - {me}"
  channel: "{channel}"                   # e.g. "{channel} ({network_label})" to include network
  query: "{query_nick}"                  # e.g. "{query_nick} ({network_label})"

# View mode: "tabbed" (one window at a time with tabs) or
# "mdi" (free-floating tiled/cascaded subwindows).
view_mode: tabbed

# Maximum rows for the tab bar.  0 = dynamic (grow as needed).
tab_rows: 0

# Initial state for new tabs:
#   "active"  — switch to the new tab immediately (default)
#   "normal"  — tab appears but doesn't become active
#   "skipped" — tab appears in skipped state (Ctrl+Tab skips it)
new_tab_state: active

# Navigation panel: "tabs" (tab bar only), "tree" (tree view only),
# or "both" (tab bar and tree view).  Requires restart.
navigation: tabs

# Display name shown in the title bar (cosmetic only, not sent to IRC).
nickname: myuser

# Close channel windows when you are kicked from a channel.
# If false, the window stays open but is marked inactive.
close_on_kick: false

# Close channel windows when disconnected from the server.
# If false, windows stay open and are marked inactive.
close_on_disconnect: false

# Show mode prefixes (@, +, %, etc.) before nicks in messages, events,
# and the nick list.
show_mode_prefix: false


# ---------------------------------------------------------------------------
# Typing notifications (IRCv3 +typing)
# ---------------------------------------------------------------------------

typing:
  send: true              # send typing notifications to channels
  show: true              # show typing indicators from other users


# ---------------------------------------------------------------------------
# Notifications
# ---------------------------------------------------------------------------
# Each event can trigger a sound and/or a desktop notification.
#
# Sound values:
#   "beep"    — system bell (default)
#   "none"    — no sound
#   "default" — use the global default sound below
#   "Alarm01" — a system sound by name (use /sounds to list available sounds)
#   "path/to/sound.wav" — play a custom .wav file (relative to qtpyrc.py)
#
# System sounds are found in platform-specific directories:
#   Windows: C:\Windows\Media    macOS: /System/Library/Sounds    Linux: /usr/share/sounds
#
# The legacy "beep: true/false" syntax is still accepted (true = default sound).
#
# For more advanced notifications (specific nicks, hostmasks, patterns, channels,
# custom sounds per sender, etc.) use /on commands with -s/-d/-h flags.
# Add them to your startup commands file to persist across restarts.  See docs/reference.md.

notifications:
  sound: beep               # global default sound: "beep", "none", a name, or a .wav path
  notice:                   # receiving a NOTICE
    sound: none
    desktop: false
  new_query:                # receiving a privmsg that opens a new query
    sound: default
    desktop: true
  highlight:                # a highlight pattern matched in a channel
    sound: default
    desktop: true
  connect:                  # connected to a server
    sound: none
    desktop: false
  disconnect:               # disconnected from a server
    sound: none
    desktop: false
  notify_online:            # someone in /notify list logged on
    sound: default
    desktop: true
  notify_offline:           # someone in /notify list logged off
    sound: none
    desktop: false
  check_interval: 60        # seconds between ISON polls for /notify list
                            # (only used when the server doesn't support MONITOR)


# ---------------------------------------------------------------------------
# Timestamps
# ---------------------------------------------------------------------------
# Tokens (case-sensitive):
#   YYYY — 4-digit year          YY  — 2-digit year
#   MM   — month (01-12)         MON — month abbreviation (Jan, Feb, Mar, ...)
#   DD   — day (01-31)           DOW — weekday abbreviation (Mon, Tue, Wed, ...)
#   HH   — 24-hour hour (00-23)  hh — 12-hour hour (01-12)
#   mm   — minutes (00-59)       MI  — minutes (alias for mm)
#   SS   — seconds (00-59)
#   AP   — AM/PM (uppercase)     ap  — am/pm (lowercase)

timestamps:
  display: "HH:mm"        # shown in chat windows (e.g. "HH:mm:SS", "hh:mm ap")


# ---------------------------------------------------------------------------
# IRC identity (global defaults)
# ---------------------------------------------------------------------------
# These can all be overridden per-network (see the networks section below).
# Overridable fields are marked [N] below.

nick: myuser              # [N] primary nickname
alt_nicks:                # [N] fallback nicks tried in order on collision
  - myuser_
  - myuser`
user: myuser              # [N] username (ident)
realname: "qtpyrc user"   # [N] real name / GECOS field


# ---------------------------------------------------------------------------
# Connection defaults
# ---------------------------------------------------------------------------

# Auto-connect to networks that have auto_connect: true on startup.
auto_connect: false       # [N] override per-network

# When you join or part a channel, update the network's auto_join list
# in config.yaml so it persists across restarts.
persist_autojoins: false  # [N] override per-network

# Legacy rate limit: minimum milliseconds between sent lines.
# Prefer the flood section below.  0 = disabled.
# ms: 500                 # [N] (as rate_limit or ms)

# Token-bucket flood protection.  Allows an initial burst of messages,
# then throttles to one message per <rate> seconds.
flood:
  burst: 5                # messages allowed before throttling
  rate: 2.0               # seconds between messages after burst
# Both burst and rate can also be set per-network and will override
# the global values independently (not as a whole section).


# ---------------------------------------------------------------------------
# Font
# ---------------------------------------------------------------------------

font:
  family: Fixedsys
  size: 15                 # font size in points
  tab_family: Segoe UI     # tab title font (omit for system default)
  tab_size: 12             # tab title font size (omit for default)
  # menu_family: Segoe UI  # menu font (omit for system default)
  # menu_size: 10
  # tree_family: Segoe UI  # network tree sidebar font (omit for system default)
  # tree_size: 10
  # nicklist_family: Fixedsys  # nick list font (omit to use chat font)
  # nicklist_size: 15
  # toolbar_family: Segoe UI  # toolbar button text font (omit for system default)
  # toolbar_size: 11          # defaults to ~55% of icon size if not specified
  # settings_family: Segoe UI  # settings dialog font (omit for system default)
  # settings_size: 10
  editor_family: Consolas  # file editor font (monospaced recommended)
  editor_size: 10


# ---------------------------------------------------------------------------
# Colors
# ---------------------------------------------------------------------------
# Values can be Qt color names or hex ("#rrggbb").
#
# Available color names:
#   white, black, red, green, blue, cyan, magenta, yellow,
#   gray, darkGray, lightGray,
#   darkRed, darkGreen, darkBlue, darkCyan, darkMagenta, darkYellow

colors:
  foreground: black        # chat text color
  background: white        # chat background color
  system: red              # system/status messages (connecting, errors, reconnect)
  info: darkGreen          # joins, parts, quits, nick changes, mode changes, topics
  action: darkMagenta      # /me actions
  notice: darkCyan         # NOTICE messages

  # Menu colors.  Defaults to foreground/background.
  #menu:
  #  foreground: black
  #  background: white

  # Network tree sidebar colors.  Defaults to foreground/background.
  #tree:
  #  foreground: black
  #  background: white

  # Nick list colors.  Defaults to foreground/background.
  # Font is under font.nicklist_family / font.nicklist_size (defaults to chat font).
  #nicklist:
  #  foreground: black
  #  background: white

  # Toolbar icon color.  Defaults to foreground.
  #toolbar:
  #  foreground: black
  #  separator: "#808080"   # separator line color (default: midpoint of fg/bg)

  # Built-in file editor colors.  Defaults to foreground/background.
  # Font is under font.editor_family / font.editor_size.
  #editor:
  #  foreground: black
  #  background: white

  # Settings dialog colors.  Defaults to foreground/background.
  #settings:
  #  foreground: black
  #  background: white

  # Settings dialog tree (left panel).  Defaults to system theme.
  #settings_tree:
  #  foreground: black
  #  background: "#f0f0f0"
  #  select_fg: white          # selected item text (default: system highlight text)
  #  select_bg: "#0078d4"      # selected item background (default: system highlight)

  # Tab colors.  Omit any to use auto-derived defaults.
  tabs:
    active_fg: white       # active tab text color (default: background color)
    active_bg: black       # active tab background (default: foreground color)
    normal_fg: black       # normal tab text color (default: foreground color)
    normal_bg: white       # normal tab background (default: background color)
    skipped_fg: gray       # skipped tab text color (default: dimmed foreground)
    skipped_bg: lightGray  # skipped tab background (default: slightly tinted)
    bar_bg: white          # tab bar empty area and blank screen
                           # (default: normal_bg, or skipped_bg if new_tab_state is skipped)

  # Search highlight (Ctrl+F).  Default: yellow background, black text.
  search_bg: yellow
  search_fg: black

  # Tab/tree activity colors.  Omit or leave blank for defaults.
  highlight: red           # color of window title when your nick is mentioned
  new_message: blue        # color of window title when there are unread messages


# ---------------------------------------------------------------------------
# Ident server
# ---------------------------------------------------------------------------

ident_username: myuser     # username reported by the built-in identd

ident:
  enabled: true
  host: "0.0.0.0"         # listen address
  port: 113                # listen port


# ---------------------------------------------------------------------------
# Backscroll & History
# ---------------------------------------------------------------------------

# Maximum number of lines kept in each channel window's backscroll buffer.
# Older lines are discarded as new ones arrive.  0 = unlimited.
backscroll_limit: 10000

# Lines of history to replay from the database when opening a window.
# Shows color-coded messages, joins, parts, etc. from previous sessions.
# Set to 0 to disable.
history_replay:
  channels: 10000            # replay on channel join (default: backscroll_limit)
  queries: 0                 # replay on query open (default: 0 / disabled)
                             # Note: nicks can be reused by different people,
                             # so query history may not belong to the same person.


# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------

logging:
  dir: logs                # directory for log files (relative to qtpyrc.py)
  use_subdirs: false       # create per-network subdirectories
  separate_by_month: false # create per-month log files
  debug: false             # enable debug-level logging
  timestamp: "YYYY-MM-DD HH:mm:SS"  # timestamp format in log files


# ---------------------------------------------------------------------------
# Scripts / Plugins
# ---------------------------------------------------------------------------

plugins:
  dir: plugins             # directory for Python plugins (relative to qtpyrc.py)
  auto_load:               # Python plugins to load automatically on startup
    - triviabot            # plain name or wildcard pattern (*, ?, [abc])
    # - "*"                # load all .py plugins in the plugins dir

scripts:
  dir: scripts             # directory for command scripts (relative to qtpyrc.py)
  startup: startup.rc      # startup commands file (runs first, gets quick-edit button)
  auto_load:               # additional command scripts to run on startup
    # - "*.rc"             # run all .rc scripts
    # - "*"                # run all scripts in the scripts dir


# ---------------------------------------------------------------------------
# Ignore & Auto-Op lists
# ---------------------------------------------------------------------------
# Global-level lists.  Entries are additive: network and channel levels
# add to these, they don't replace them.
# Masks support wildcards: nick, nick!*@*, *!*@host, etc.

# ignores:
#   - "spammer!*@*"
#   - "annoying_nick"

# auto_ops:
#   - "trusted!*@trusted.host"

# Highlight patterns.  Messages matching any pattern trigger highlight
# activity and (optionally) beep/desktop notifications.
# Plain strings are case-insensitive substring matches.
# Wrap in /slashes/ for regex, /pattern/i for case-insensitive regex.
# Use {me} to refer to your current nickname.
# Use \{ and \} for literal braces, \\ for a literal backslash
# (so a literal \{ requires \\{ — i.e. \\\{ in YAML double-quoted strings).
# Regex quantifiers like {3} or {1,5} are unaffected.
# Lists are additive: global + network + channel.
# Set highlights: false at the channel level to disable all highlights.
# For per-pattern sounds or per-nick notifications, use /on commands instead
# (see the /on section in docs/reference.md).
highlights:
  - "{me}"
#  - "important"
#  - "/deploy\s+fail/i"

# Nick watch list (global).  /notify nicks are tracked via MONITOR if the
# server supports it, otherwise checked periodically via ISON polling.
# notify:
#   - friend1
#   - friend2


# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
# Each key is a network identifier used internally.
#
# The following fields can be set at the network level to override the
# global defaults defined above:
#   nick, alt_nicks, user, realname          (identity)
#   auto_connect, persist_autojoins          (connection behavior)
#   rate_limit / ms                          (legacy rate limit)
#   flood: { burst, rate }                   (token-bucket flood protection)
#   password                                 (server password, also checked
#                                             at the server level)
#   ignores, auto_ops                        (additive, not replacing)
#
# Network-specific fields (not global):
#   name            — reported network name for matching
#   server/servers  — connection details
#   sasl            — SASL authentication
#   auto_join       — channels to join on connect

networks:

  # --- Example: single server ---
  libera:
    name: Libera.Chat           # match against the server-reported network name

    # Identity overrides (omit to use global defaults)
    nick: mynick
    # alt_nicks:
    #   - mynick_
    # user: myident
    # realname: "my real name"

    auto_connect: true     # connect to this network on startup
    persist_autojoins: true

    # Server password (checked at server level first, then network level)
    # password: "server_password_here"

    # Single server
    server:
      host: irc.libera.chat
      port: 6697
      tls: true
      tls_verify: true

    # SASL authentication
    sasl:
      mechanism: PLAIN     # PLAIN or EXTERNAL
      username: mynick
      password: "my_sasl_password"

    # Channels to auto-join.  Value is the channel key, or null for no key.
    auto_join:
      '#channel1':
      '#channel2':
      '#keyed-channel': the_channel_key

    # Per-network flood protection (overrides global burst/rate independently)
    # flood:
    #   burst: 3
    #   rate: 1.5

    # Per-network ignore/auto-op/notify/highlights (additive with global lists)
    # ignores:
    #   - "bot!*@*"
    # auto_ops:
    #   - "friend!*@friend.host"
    # notify:
    #   - friendnick
    # highlights:
    #   - "urgent"

    # Per-network channel settings
    # channels:
    #   '#channel1':
    #     ignores:
    #       - "chanspammer"
    #     auto_ops:
    #       - "chanop!*@*"
    #     highlights:
    #       - "deploy"
    #     highlight_notify: false   # suppress beep/desktop for this channel

  # --- Example: multiple servers with cycling ---
  # If connection to one server fails, the client cycles to the next.
  undernet:
    servers:
      - host: irc.undernet.org
        port: 6667
        tls: false
      - host: us.undernet.org
        port: 6667
        tls: false
      - host: eu.undernet.org
        port: 6667
        tls: false

    # auto_join:
    #   '#somechannel':

  # --- Example: minimal network ---
  efnet:
    server:
      host: irc.efnet.org
      tls_verify: false
